name: "Deploy Dependabot Images"

on:
  push:
    branches:
      - 'dependabot/**'

  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set tags and NZBDAV_VERSION
        id: set_vars
        run: |
          RAW_REF="${{ github.ref_name }}"
          DOCKER_TAG=$(echo "$RAW_REF" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's#[^a-z0-9._-]+#-#g' \
            | sed -E 's#(^-+|-+$)##g')
          echo "DOCKER_TAG: $DOCKER_TAG"
          echo "NZBDAV_VERSION=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          GHCR_REPO="ghcr.io/${{ github.repository }}-dependabot"
          echo "TAGS=${GHCR_REPO}:${DOCKER_TAG}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image (amd64 + arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.set_vars.outputs.TAGS }}
          build-args: |
            NZBDAV_VERSION=${{ steps.set_vars.outputs.NZBDAV_VERSION }}
            REPO_URL=https://github.com/${{ github.repository }}
